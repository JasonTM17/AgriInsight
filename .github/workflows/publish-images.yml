name: Publish release images

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  publish:
    name: Publish ${{ matrix.name }}
    runs-on: ubuntu-latest
    environment: release-images
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: python
            context: .
            file: ./Dockerfile
          - name: backend
            context: ./backend
            file: ./backend/Dockerfile
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Validate immutable release coordinates
        id: refs
        env:
          DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          [[ "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          test -n "$DOCKERHUB_NAMESPACE"
          test -n "$DOCKERHUB_USERNAME"
          test -n "$DOCKERHUB_TOKEN"
          version="${GITHUB_REF_NAME#v}"
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "dockerhub=$DOCKERHUB_NAMESPACE/agriinsight-${{ matrix.name }}" >> "$GITHUB_OUTPUT"
          echo "ghcr=ghcr.io/$owner/agriinsight-${{ matrix.name }}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Authenticate to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Authenticate to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive immutable tags and OCI labels
        id: metadata
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: |
            ${{ steps.refs.outputs.dockerhub }}
            ${{ steps.refs.outputs.ghcr }}
          tags: |
            type=raw,value=${{ steps.refs.outputs.version }}
            type=raw,value=sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.refs.outputs.version }}

      - name: Build, attest, and publish
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          build-args: |
            OCI_SOURCE=${{ github.server_url }}/${{ github.repository }}
            OCI_REVISION=${{ github.sha }}
            OCI_VERSION=${{ steps.refs.outputs.version }}
          provenance: mode=max
          sbom: true

      - name: Scan the exact published digest
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.refs.outputs.ghcr }}@${{ steps.build.outputs.digest }}
          scanners: vuln,secret,misconfig
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

      - name: Smoke-test exact Python digest
        if: matrix.name == 'python'
        run: docker run --rm --entrypoint python "${{ steps.refs.outputs.ghcr }}@${{ steps.build.outputs.digest }}" -c "import agriinsight; print('agriinsight-python-ok')"

      - name: Smoke-test exact backend digest
        if: matrix.name == 'backend'
        run: docker run --rm --entrypoint /bin/sh "${{ steps.refs.outputs.ghcr }}@${{ steps.build.outputs.digest }}" -ec 'test -s /app/app.jar && java -version'

      - name: Verify both registry tags resolve to the returned digest
        env:
          EXPECTED_DIGEST: ${{ steps.build.outputs.digest }}
          VERSION: ${{ steps.refs.outputs.version }}
          DOCKERHUB_IMAGE: ${{ steps.refs.outputs.dockerhub }}
          GHCR_IMAGE: ${{ steps.refs.outputs.ghcr }}
        run: |
          set -euo pipefail
          for image in "$DOCKERHUB_IMAGE" "$GHCR_IMAGE"; do
            actual="$(docker buildx imagetools inspect "$image:$VERSION" --format '{{json .Manifest.Digest}}' | tr -d '"')"
            test "$actual" = "$EXPECTED_DIGEST"
          done
