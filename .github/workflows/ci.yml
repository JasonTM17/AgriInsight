name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install ".[dev,dashboard]"
      - run: pytest
      - run: python -m agriinsight run --output artifacts --farms 2 --fields-per-farm 2 --activities-per-season 6
      - run: python -m compileall -q src dashboard tests
