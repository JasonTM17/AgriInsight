spring:
  application:
    name: agriinsight-backend
  jackson:
    deserialization:
      fail-on-unknown-properties: true
  datasource:
    url: ${AGRIINSIGHT_DB_URL:jdbc:postgresql://localhost:5432/agriinsight}
    username: ${AGRIINSIGHT_DB_RUNTIME_USERNAME:agriinsight_runtime}
    password: ${AGRIINSIGHT_DB_RUNTIME_PASSWORD:}
    hikari:
      connection-timeout: ${AGRIINSIGHT_DB_CONNECTION_TIMEOUT_MS:3000}
      validation-timeout: ${AGRIINSIGHT_DB_VALIDATION_TIMEOUT_MS:1000}
      initialization-fail-timeout: ${AGRIINSIGHT_DB_INITIALIZATION_FAIL_TIMEOUT_MS:-1}
      data-source-properties:
        connectTimeout: ${AGRIINSIGHT_DB_CONNECT_TIMEOUT_SECONDS:3}
        loginTimeout: ${AGRIINSIGHT_DB_LOGIN_TIMEOUT_SECONDS:5}
        socketTimeout: ${AGRIINSIGHT_DB_SOCKET_TIMEOUT_SECONDS:5}
        tcpKeepAlive: ${AGRIINSIGHT_DB_TCP_KEEPALIVE:true}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate.boot.allow_jdbc_metadata_access: false
      hibernate.jdbc.time_zone: UTC
      jakarta.persistence.database-product-name: PostgreSQL
      jakarta.persistence.database-major-version: 18
      jakarta.persistence.database-minor-version: 0
  flyway:
    enabled: ${AGRIINSIGHT_FLYWAY_ENABLED:false}
    url: ${AGRIINSIGHT_FLYWAY_URL:${AGRIINSIGHT_DB_URL:jdbc:postgresql://localhost:5432/agriinsight}}
    user: ${AGRIINSIGHT_FLYWAY_USERNAME:agriinsight_migrator}
    password: ${AGRIINSIGHT_FLYWAY_PASSWORD:}

server:
  address: ${AGRIINSIGHT_SERVER_ADDRESS:127.0.0.1}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db,schemaHistory

agriinsight:
  api-docs:
    enabled: ${AGRIINSIGHT_API_DOCS_ENABLED:false}
  identity:
    enabled: ${AGRIINSIGHT_IDENTITY_ENABLED:false}
    issuer-uri: ${AGRIINSIGHT_OIDC_ISSUER_URI:}
    jwk-set-uri: ${AGRIINSIGHT_OIDC_JWK_SET_URI:}
    api-audience: ${AGRIINSIGHT_OIDC_API_AUDIENCE:}
    interactive-client-id: ${AGRIINSIGHT_OIDC_INTERACTIVE_CLIENT_ID:}
    clock-skew: ${AGRIINSIGHT_OIDC_CLOCK_SKEW:60s}
    jws-algorithm: ${AGRIINSIGHT_OIDC_JWS_ALGORITHM:RS256}
    discriminator-location: ${AGRIINSIGHT_OIDC_DISCRIMINATOR_LOCATION:CLAIM}
    discriminator-name: ${AGRIINSIGHT_OIDC_DISCRIMINATOR_NAME:token_use}
    discriminator-value: ${AGRIINSIGHT_OIDC_DISCRIMINATOR_VALUE:access}
    display-name-claim: ${AGRIINSIGHT_OIDC_DISPLAY_NAME_CLAIM:name}
    email-claim: ${AGRIINSIGHT_OIDC_EMAIL_CLAIM:email}
    assurance-claim: ${AGRIINSIGHT_OIDC_ASSURANCE_CLAIM:acr}
    cors-allowed-origins: ${AGRIINSIGHT_CORS_ALLOWED_ORIGINS:}
  schema:
    expected-version: ${AGRIINSIGHT_SCHEMA_EXPECTED_VERSION:19}

springdoc:
  api-docs:
    enabled: ${AGRIINSIGHT_API_DOCS_ENABLED:false}
    version: openapi-3-1
  paths-to-match: /api/v1/**
  writer-with-order-by-keys: true
  writer-with-default-pretty-printer: true
  swagger-ui:
    enabled: ${AGRIINSIGHT_API_DOCS_ENABLED:false}
